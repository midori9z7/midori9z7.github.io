    <h1>蝴蝶
    </h1>
<p><pre>
夏天在我眼前快进着时代
一世纪、一次崭新的死亡和生命的绽放
无非是在撞了南墙后偶然萌发的故障
望着风扇发怵
夏天的恶心浩荡着快进着我们的未来
时代攥紧在我手中用重墨填满
填满你不安而无措的夜晚，夜晚
夜晚失眠是被夜晚异化的性病
意淫着白天一切痛苦的消失

你是否化作一对相等的幸运
落在我的眉间
生命的绽放
可以是端坐在百川前听这留白的盈满
扫清一生中清醒的疲惫</pre></p>

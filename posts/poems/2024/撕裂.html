    <h1>撕裂
    </h1>
<p><pre>
蠢蠢欲动的春被几股寒风扼住歌喉
树也会不胜绵雨 芽儿钻不出泥土
就像植物麻木于世间的麻木

我经过了一个破败的孤岛
那上面围困着无数个自己
几十亿年是地球的高龄
我自上岛起便格格不入
是谁一不小心潮起又潮落
往复回环的只能是我们的孤岛

就让凄惨的美梦与可亲的现实相继撕裂
暴雨降临时不存在帝王或孤军
我的每一根植茎在万箭中止不住地怒吼
呼喊着要深根于所有被戕害的泥土之中
尚未沉底仍受圣日之威压
人不应当如此悲哀地残喘</pre></p>

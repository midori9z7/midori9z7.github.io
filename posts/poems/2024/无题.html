    <h1>无题
    </h1>
<p><pre>
抬头再看，
无瑕而明亮。
遇见你是如此的惨烈
隐隐约约地感受到一幕悲剧
让悲观的绝望
让乐天的夭亡
一场忧伤的结局
两瓣积灰的心房

易安的
梅花，在我的夏至全盛
木梳，在我的立冬行舟
她会爱上月亮
她也比不起月亮

千年落下同一片雪
万年不过同一只月
月亮被
月亮照亮的云，灰蒙一片的云遮盖了
月亮从此不再明晰
你们的信仰更是我的月光
我要到哪里找见我的死寂
</pre></p>
